# PRISMATIC ENGINE — Workspace Governance
# Converted: 2026-06-14 by Jules (GRO-1561)
# Repo: darius-star
#
# This file governs how AI agents collaborate on this repository.
# Every agent MUST respect lane assignments, branch conventions, and locking protocol.
version: 1.0.0
agents:
  fred:
    role: Orchestrator & Staging Governor
    lanes:
      owner:
      - '*'
      read_only: []
    branch_prefix: feature/
    staging_governor: true
  ned:
    role: Code Execution & Game Logic
    lanes:
      owner:
      - js/
      - css/
      - scripts/
      - tools/
      - prismatic/
      - plugins/
      read_only:
      - assets/
      - docs/
    branch_prefix: ned/
  agy:
    role: Asset Designer & Auditor
    lanes:
      owner:
      - assets/
      - designs/
      - docs/
      read_only:
      - js/
      - css/
    branch_prefix: agy/
  jules:
    role: PR Auditor & Documentation
    lanes:
      owner:
      - docs/
      - README.md
      read_only:
      - js/
      - assets/
      - css/
    branch_prefix: jules/
  codex:
    role: Code Review & Refactoring
    lanes:
      owner:
      - js/
      - css/
      read_only:
      - assets/
      - docs/
    branch_prefix: codex/
staging:
  governor: fred
  branch: deploy-fresh
locks:
  file: /home/ubuntu/.antigravity/swarm_locks.json
  heartbeat_interval_s: 60
  heartbeat_ttl_ms: 300000
commit:
  prefix_format: '[Agent] description (#ISSUE)'
  require_issue_ref: true
providers:
  default: google-antigravity
  fallback_chain:
  - claude-code
pipeline:
  phase1_development:
    stages:
    - worker_implementation
    - self_validation_loop
    - peer_review
    - fix_application
    - orchestrator_approval
  phase2_post_publish:
    trigger: github_push_detected
    stages:
    - active_review
    - read_only_review
    - apply_suggestions
    - publish_and_validate
policies:
  global:
    monthly_budget: 10000
    hard_stop_at: 9000
