<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darius Star: Cyber Coelacanth</title>
    <meta name="description" content="Darius Star: Cyber Coelacanth — a retro arcade shoot-em-up from What An Adventure Games. Battle through waves of enemies and face the cyber coelacanth boss.">
    <meta property="og:title" content="Darius Star: Cyber Coelacanth">
    <meta property="og:description" content="A retro arcade shoot-em-up from What An Adventure Games.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://whatanadventure.games/darius-star/">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin: 5px 0;
            font-size: 24px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #0000ff;
            letter-spacing: 2px;
        }

        .studio-credit {
            font-size: 12px;
            color: #ff0055;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
            text-shadow: 0 0 8px rgba(255, 0, 85, 0.4);
        }

        .studio-credit a {
            color: #ff0055;
            text-decoration: none;
            transition: text-shadow 0.3s;
        }

        .studio-credit a:hover {
            text-shadow: 0 0 12px #ff0055;
        }

        #game-container {
            position: relative;
            border: 4px solid #3a3a5a;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            background-color: #000;
            image-rendering: pixelated;
            /* Fit viewport while maintaining aspect ratio */
            max-width: 100vw;
            max-height: calc(100vh - 120px);
        }

        canvas {
            display: block;
            background: #000;
            /* Responsive scaling: fit viewport, maintain 16:9 */
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
        }

        .instructions {
            margin-top: 10px;
            font-size: 14px;
            color: #8a8a9f;
            text-align: center;
            max-width: 800px;
            line-height: 1.4;
        }

        .keys {
            color: #00ffff;
            font-weight: bold;
        }

        #controls-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(10, 10, 30, 0.7);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #00ffff;
            font-size: 12px;
            pointer-events: none;
        }

        /* On-screen touch controls (hidden on desktop by default) */
        #touch-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 140px;
            z-index: 100;
            pointer-events: none;
        }
        #touch-controls.active {
            display: block;
        }
        #dpad {
            position: absolute;
            left: 15px;
            bottom: 15px;
            width: 130px;
            height: 130px;
            pointer-events: auto;
        }
        .dpad-btn {
            position: absolute;
            width: 42px;
            height: 42px;
            background: rgba(0, 255, 255, 0.15);
            border: 2px solid rgba(0, 255, 255, 0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(0, 255, 255, 0.7);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active, .dpad-btn.pressed {
            background: rgba(0, 255, 255, 0.35);
            border-color: #00ffff;
            color: #00ffff;
        }
        #dpad-up    { top: 0; left: 44px; }
        #dpad-down  { bottom: 0; left: 44px; }
        #dpad-left  { top: 44px; left: 0; }
        #dpad-right { top: 44px; right: 0; }
        #dpad-center { top: 44px; left: 44px; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); }

        #fire-btn {
            position: absolute;
            right: 20px;
            bottom: 25px;
            width: 70px;
            height: 70px;
            background: rgba(255, 0, 85, 0.2);
            border: 3px solid rgba(255, 0, 85, 0.5);
            border-radius: 50%;
            font-size: 13px;
            font-weight: bold;
            color: rgba(255, 0, 85, 0.8);
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
        }
        #fire-btn:active, #fire-btn.pressed {
            background: rgba(255, 0, 85, 0.5);
            border-color: #ff0055;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
        }

        /* Show touch controls on touch-enabled devices */
        @media (hover: none) and (pointer: coarse) {
            #touch-controls {
                display: block;
            }
            #game-container {
                max-height: calc(100vh - 200px);
            }
        }

        /* Hide instructions on mobile */
        @media (max-width: 600px) {
            .instructions {
                display: none;
            }
            h1 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <h1>DARIUS STAR: CYBER COELACANTH</h1>
    <div class="studio-credit">A <a href="https://whatanadventure.games" target="_blank">What An Adventure</a> Game</div>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div id="controls-overlay">
            <div style="color: #ff0055; font-weight: bold; margin-bottom: 4px;">SYSTEM STATUS</div>
            <div>SHIELD: <span id="ui-shield" style="color: #00ff00;">100%</span></div>
            <div>WEAPON: <span id="ui-weapon" style="color: #ffff00;">LVL 1</span></div>
            <div>SCORE: <span id="ui-score" style="color: #00ffff;">0</span></div>
        </div>
    </div>

    <!-- On-Screen Touch Controls -->
    <div id="touch-controls">
        <div id="dpad">
            <div class="dpad-btn" id="dpad-up">▲</div>
            <div class="dpad-btn" id="dpad-down">▼</div>
            <div class="dpad-btn" id="dpad-left">◀</div>
            <div class="dpad-btn" id="dpad-right">▶</div>
            <div class="dpad-btn" id="dpad-center"></div>
        </div>
        <div id="fire-btn">FIRE</div>
    </div>

    <div class="instructions">
        <span class="keys">W, A, S, D</span> or <span class="keys">ARROW KEYS</span> to Move | 
        <span class="keys">SPACEBAR</span> or <span class="keys">J</span> to Fire | 
        <span class="keys">P</span> to Pause
        <br>
        <span style="color: #ff0055;">Red Orbs</span> upgrade primary weapons. <span style="color: #00ff55;">Green Orbs</span> restore Shields. Reaching 2,000 points triggers the Boss Battle!
    </div>

    <script>
        // --- Web Audio Synthesizer ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (type === 'shoot') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.12);
                } else if (type === 'hit') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'explosion') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(80, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.45);
                    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.45);
                } else if (type === 'powerup') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(280, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(520, audioCtx.currentTime + 0.08);
                    osc.frequency.linearRampToValueAtTime(850, audioCtx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                } else if (type === 'siren') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(350, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(450, audioCtx.currentTime + 0.2);
                    osc.frequency.linearRampToValueAtTime(350, audioCtx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.4);
                } else if (type === 'laser_charge') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 1.2);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.1, audioCtx.currentTime + 1.2);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 1.2);
                } else if (type === 'laser_fire') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 1.5);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 1.5);
                }
            } catch (e) {
                console.log("Audio play blocked/failed:", e);
            }
        }

        // --- Game Setup ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Responsive canvas: maintain internal 800x450, scale display via CSS
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 450;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        function resizeCanvas() {
            const maxW = window.innerWidth;
            const maxH = window.innerHeight - 120; // space for header + controls
            const scale = Math.min(maxW / GAME_WIDTH, maxH / GAME_HEIGHT);
            canvas.style.width = (GAME_WIDTH * scale) + 'px';
            canvas.style.height = (GAME_HEIGHT * scale) + 'px';
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
        resizeCanvas();

        const uiShield = document.getElementById('ui-shield');
        const uiWeapon = document.getElementById('ui-weapon');
        const uiScore = document.getElementById('ui-score');

        // Game state variables
        let score = 0;
        let gameOver = false;
        let gameWon = false;
        let paused = false;
        let lastTime = 0;
        let gameTime = 0;
        let bossSpawned = false;
        let sirenTimer = 0;

        // Keys pressed
        const keys = {};
        window.addEventListener('keydown', e => {
            ensureBackgroundImages();
            initAudio();
            loadPlayerSprites();
            loadEnemySprites();
            loadVFXSprites();
            if (e.key === 'p' || e.key === 'P') {
                paused = !paused;
            }
            keys[e.key] = true;
            if (['Space', ' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].indexOf(e.key) > -1) {
                e.preventDefault();
            }
        });
        // --- Touch Controls ---
        const touchKeys = { 'w': false, 'a': false, 's': false, 'd': false, ' ': false };

        function setupTouchButton(elId, key) {
            const el = document.getElementById(elId);
            if (!el) return;
            
            el.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                initAudio();
                ensureBackgroundImages();
                loadPlayerSprites();
            loadEnemySprites();
                loadVFXSprites();
                keys[key] = true;
                el.classList.add('pressed');
            });
            el.addEventListener('pointerup', (e) => {
                e.preventDefault();
                keys[key] = false;
                el.classList.remove('pressed');
            });
            el.addEventListener('pointerleave', (e) => {
                keys[key] = false;
                el.classList.remove('pressed');
            });
            // Prevent touch scrolling on controls
            el.addEventListener('touchstart', (e) => e.preventDefault());
            el.addEventListener('touchmove', (e) => e.preventDefault());
        }

        // Set up each touch button
        setupTouchButton('dpad-up', 'w');
        setupTouchButton('dpad-down', 's');
        setupTouchButton('dpad-left', 'a');
        setupTouchButton('dpad-right', 'd');
        setupTouchButton('fire-btn', ' ');

        window.addEventListener('keyup', e => {
            keys[e.key] = false;
        });

        // --- Player Ship Class ---
        class Player {
            constructor() {
                this.x = 80;
                this.y = canvas.height / 2;
                this.width = 40;
                this.height = 20;
                this.speed = 220;
                this.shieldMax = 100;
                this.shield = 100;
                this.weaponLevel = 1;
                this.shootCooldown = 0.15;
                this.shootTimer = 0;
                this.color = '#00ffff';
                this.invulnerable = 0;
            }

            update(dt) {
                if (this.invulnerable > 0) {
                    this.invulnerable -= dt;
                }

                let dx = 0;
                let dy = 0;
                if (keys['w'] || keys['W'] || keys['ArrowUp']) dy -= 1;
                if (keys['s'] || keys['S'] || keys['ArrowDown']) dy += 1;
                if (keys['a'] || keys['A'] || keys['ArrowLeft']) dx -= 1;
                if (keys['d'] || keys['D'] || keys['ArrowRight']) dx += 1;

                if (dx !== 0 && dy !== 0) {
                    dx *= 0.7071;
                    dy *= 0.7071;
                }

                this.x += dx * this.speed * dt;
                this.y += dy * this.speed * dt;

                if (this.x < 10) this.x = 10;
                if (this.x > canvas.width - this.width - 10) this.x = canvas.width - this.width - 10;
                if (this.y < 10) this.y = 10;
                if (this.y > canvas.height - this.height - 10) this.y = canvas.height - this.height - 10;

                if (this.shootTimer > 0) {
                    this.shootTimer -= dt;
                }

                if ((keys[' '] || keys['j'] || keys['J']) && this.shootTimer <= 0) {
                    this.shoot();
                    this.shootTimer = this.shootCooldown;
                }
            }

            shoot() {
                playSound('shoot');
                const bulletSpeed = 550;
                const bulletSize = 4;

                if (this.weaponLevel === 1) {
                    bullets.push(new Bullet(this.x + this.width, this.y + this.height/2, bulletSpeed, 0, '#00ffff', bulletSize));
                } else if (this.weaponLevel === 2) {
                    bullets.push(new Bullet(this.x + this.width, this.y + 4, bulletSpeed, 0, '#00ffaa', bulletSize + 1));
                    bullets.push(new Bullet(this.x + this.width, this.y + this.height - 4, bulletSpeed, 0, '#00ffaa', bulletSize + 1));
                } else if (this.weaponLevel === 3) {
                    bullets.push(new Bullet(this.x + this.width, this.y + this.height/2, bulletSpeed, 0, '#ffff00', bulletSize + 1));
                    bullets.push(new Bullet(this.x + this.width, this.y + 2, bulletSpeed, -100, '#ffff00', bulletSize));
                    bullets.push(new Bullet(this.x + this.width, this.y + this.height - 2, bulletSpeed, 100, '#ffff00', bulletSize));
                } else if (this.weaponLevel === 4) {
                    bullets.push(new Bullet(this.x + this.width, this.y + this.height/2, bulletSpeed, 0, '#ff00ff', 12, true));
                    bullets.push(new Bullet(this.x + this.width, this.y + 2, bulletSpeed - 50, -120, '#00ffff', bulletSize));
                    bullets.push(new Bullet(this.x + this.width, this.y + this.height - 2, bulletSpeed - 50, 120, '#00ffff', bulletSize));
                } else {
                    bullets.push(new Bullet(this.x + this.width, this.y + this.height/2, bulletSpeed + 50, 0, '#ffffff', 14, true));
                    bullets.push(new Bullet(this.x + this.width, this.y + 2, bulletSpeed, -160, '#ff00aa', bulletSize + 2));
                    bullets.push(new Bullet(this.x + this.width, this.y + this.height - 2, bulletSpeed, 160, '#ff00aa', bulletSize + 2));
                    bullets.push(new Bullet(this.x + this.width, this.y + 4, bulletSpeed - 80, -300, '#ffff00', bulletSize + 1));
                    bullets.push(new Bullet(this.x + this.width, this.y + this.height - 4, bulletSpeed - 80, 300, '#ffff00', bulletSize + 1));
                }
            }

            takeDamage(amt) {
                if (this.invulnerable > 0) return;
                this.shield -= amt;
                this.invulnerable = 0.8;
                playSound('hit');
                createExplosion(this.x + this.width/2, this.y + this.height/2, '#ffaa00', 8);

                if (this.shield <= 0) {
                    this.shield = 0;
                    gameOver = true;
                    playSound('explosion');
                    createExplosion(this.x, this.y, '#ff0000', 40);
                }
            }

            draw() {
                if (this.invulnerable > 0 && Math.floor(this.invulnerable * 15) % 2 === 0) {
                    return;
                }

                ctx.save();
                ctx.translate(this.x, this.y);

                // Sprite frame: toggle between player_0 and player_1 for thruster animation
                const frameKey = (Math.floor(gameTime * 6) % 2 === 0) ? 'player_0' : 'player_1';
                const sprite = playerSprites[frameKey];

                if (sprite && sprite.complete && sprite.naturalWidth > 0) {
                    // Render sprite scaled to 48x48 (ship area ~40x20, sprite is 1024x1024)
                    const spriteSize = 48;
                    ctx.drawImage(sprite, 0, 0, spriteSize, spriteSize);
                } else {
                    // Fallback: simple triangle ship if sprite not loaded yet
                    ctx.fillStyle = '#8a9fbc';
                    ctx.beginPath();
                    ctx.moveTo(0, 4);
                    ctx.lineTo(25, 4);
                    ctx.lineTo(40, this.height / 2);
                    ctx.lineTo(25, this.height - 4);
                    ctx.lineTo(0, this.height - 4);
                    ctx.closePath();
                    ctx.fill();

                    ctx.fillStyle = '#ff7700';
                    ctx.beginPath();
                    ctx.moveTo(0, 5);
                    ctx.lineTo(-8, this.height / 2);
                    ctx.lineTo(0, this.height - 5);
                    ctx.closePath();
                    ctx.fill();
                }

                // Weapon level 4+ shield aura (sprite-based)
                if (this.weaponLevel >= 4) {
                    const shieldSprite = vfxSprites['shield'];
                    if (shieldSprite && shieldSprite.complete && shieldSprite.naturalWidth > 0) {
                        // Pulsing alpha based on game time
                        const pulse = 0.25 + Math.sin(gameTime * 3) * 0.15;
                        ctx.globalAlpha = pulse;
                        // Render translucent blue forcefield ring (1024x1024 → 72x72)
                        const shieldSize = 72;
                        ctx.drawImage(shieldSprite,
                            -shieldSize / 2 + 24,  // center x offset
                            -shieldSize / 2 + this.height / 2,  // center y offset
                            shieldSize, shieldSize);
                        ctx.globalAlpha = 1;
                    } else {
                        // Fallback: procedural circle
                        ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(24, this.height / 2, 28, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }

                ctx.restore();
            }
        }

        // --- Bullet Class ---
        class Bullet {
            constructor(x, y, vx, vy, color, size = 4, isWave = false) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.size = size;
                this.isWave = isWave;
                this.age = 0;
            }

            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.age += dt;

                if (this.isWave) {
                    this.y += Math.sin(this.age * 22) * 4;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Rotate to face bullet direction
                const angle = Math.atan2(this.vy, this.vx);
                ctx.rotate(angle);

                const sprite = vfxSprites['laser'];
                if (sprite && sprite.complete && sprite.naturalWidth > 0) {
                    // Render laser sprite scaled to bullet size (sprite is 1024x1024)
                    const renderSize = this.size * 3.5;
                    ctx.globalAlpha = 0.9;
                    if (this.isWave) {
                        ctx.shadowColor = this.color;
                        ctx.shadowBlur = 12;
                    }
                    ctx.drawImage(sprite, -renderSize / 2, -renderSize / 2, renderSize, renderSize);
                    ctx.shadowBlur = 0;
                } else {
                    // Fallback: colored rectangle
                    ctx.fillStyle = this.color;
                    if (this.isWave) {
                        ctx.shadowColor = this.color;
                        ctx.shadowBlur = 10;
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    } else {
                        ctx.fillRect(-this.size, -2, this.size * 2, 4);
                    }
                }

                ctx.restore();
            }
        }

        // --- Enemy Bullet Class ---
        class EnemyBullet {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = '#ff3300';
                this.size = 5;
            }

            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Rotate: enemy bullets move left-to-right (vx is negative)
                const angle = Math.atan2(this.vy, this.vx);
                ctx.rotate(angle);

                const renderSize = this.size * 4;
                const pulse = 0.7 + Math.sin(gameTime * 8 + this.x * 0.05) * 0.3;

                // Subtle shimmer accent — faint radial glow behind the bolt
                const glowGrad = ctx.createRadialGradient(0, 0, renderSize * 0.15, 0, 0, renderSize * 0.8);
                glowGrad.addColorStop(0, 'rgba(255, 100, 30, 0.5)');
                glowGrad.addColorStop(0.5, 'rgba(255, 30, 0, 0.15)');
                glowGrad.addColorStop(1, 'rgba(255, 0, 0, 0)');

                ctx.globalAlpha = pulse * 0.7;
                ctx.fillStyle = glowGrad;
                ctx.fillRect(-renderSize * 0.8, -renderSize * 0.8, renderSize * 1.6, renderSize * 1.6);

                // Enemy laser bolt sprite on top
                const sprite = vfxSprites['laser_enemy'];
                if (sprite && sprite.complete && sprite.naturalWidth > 0) {
                    ctx.globalAlpha = 0.9;
                    // Center the 1024×1024 sprite, scale to renderSize
                    const sw = sprite.naturalWidth;
                    const sh = sprite.naturalHeight;
                    ctx.drawImage(sprite,
                        0, 0, sw, sh,                           // source rect (full sprite)
                        -renderSize / 2, -renderSize / 2,       // dest x, y
                        renderSize, renderSize);                 // dest w, h
                }

                ctx.globalAlpha = 1;
                ctx.restore();
            }
        }

        // --- Enemy Ship Classes ---
        class Enemy {
            constructor(type) {
                this.type = type;
                this.x = canvas.width + 50;
                this.y = 50 + Math.random() * (canvas.height - 100);
                this.width = 30;
                this.height = 30;
                this.age = 0;

                if (type === 'scout') {
                    this.speed = 150;
                    this.hp = 1;
                    this.scoreValue = 100;
                    this.color = '#ff5500';
                    this.startY = this.y;
                } else if (type === 'interceptor') {
                    this.speed = 280;
                    this.hp = 1;
                    this.scoreValue = 150;
                    this.color = '#ff0055';
                } else if (type === 'heavy') {
                    this.speed = 80;
                    this.hp = 4;
                    this.scoreValue = 300;
                    this.color = '#9a33cc';
                    this.shootCooldown = 1.2 + Math.random() * 0.8;
                    this.shootTimer = this.shootCooldown;
                } else {
                    this.speed = 180;
                    this.hp = 2;
                    this.scoreValue = 50;
                    this.color = '#33cc55';
                }
            }

            update(dt) {
                this.age += dt;

                if (this.type === 'scout') {
                    this.x -= this.speed * dt;
                    this.y = this.startY + Math.sin(this.age * 5) * 60;
                } else if (this.type === 'interceptor') {
                    this.x -= this.speed * dt;
                } else if (this.type === 'heavy') {
                    this.x -= this.speed * dt;
                    this.shootTimer -= dt;
                    if (this.shootTimer <= 0) {
                        this.shoot();
                        this.shootTimer = this.shootCooldown;
                    }
                } else if (this.type === 'boss_minion') {
                    this.x -= this.speed * dt;
                    this.y += Math.sin(this.age * 8) * 80 * dt;
                }
            }

            shoot() {
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const bulletSpeed = -220;

                enemyBullets.push(new EnemyBullet(this.x, this.y + this.height/2, bulletSpeed, (dy/dist) * 100));
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                const sprite = enemySprites[this.type];
                const hasSprite = sprite && sprite.complete && sprite.naturalWidth > 0;

                if (hasSprite) {
                    // Map each type to appropriate render size (sprites are 1024x1024)
                    const sizes = { scout: 36, interceptor: 36, heavy: 44, boss_minion: 32 };
                    const size = sizes[this.type] || 36;
                    ctx.drawImage(sprite, 0, 0, size, size);
                } else {
                    // Fallback: colored shapes if sprite not loaded
                    ctx.fillStyle = this.color;
                    if (this.type === 'scout') {
                        ctx.beginPath();
                        ctx.moveTo(30, 15); ctx.lineTo(10, 0); ctx.lineTo(0, 15); ctx.lineTo(10, 30);
                        ctx.closePath(); ctx.fill();
                    } else if (this.type === 'interceptor') {
                        ctx.beginPath();
                        ctx.moveTo(30, 15); ctx.lineTo(0, 5); ctx.lineTo(10, 15); ctx.lineTo(0, 25);
                        ctx.closePath(); ctx.fill();
                    } else if (this.type === 'heavy') {
                        ctx.beginPath();
                        ctx.moveTo(30, 5); ctx.lineTo(10, 0); ctx.lineTo(0, 15); ctx.lineTo(10, 30);
                        ctx.lineTo(30, 25); ctx.lineTo(20, 15);
                        ctx.closePath(); ctx.fill();
                    } else if (this.type === 'boss_minion') {
                        ctx.beginPath();
                        ctx.arc(15, 15, 14, 0, Math.PI * 2); ctx.fill();
                    }
                }

                ctx.restore();
            }
        }

        // --- Boss Fighter Class (Cyber Coelacanth) ---
        class Boss {
            constructor() {
                this.x = canvas.width + 100;
                this.y = canvas.height / 2 - 80;
                this.width = 180;
                this.height = 140;
                this.hpMax = 120;
                this.hp = 120;
                this.state = 'intro';
                this.stateTimer = 2;
                this.bobTimer = 0;
                this.shootTimer = 1.0;
                this.laserWarningTimer = 0;
                this.color = '#305080';
                this.shieldColor = '#ff00aa';
            }

            update(dt) {
                this.bobTimer += dt;

                if (this.state === 'intro') {
                    this.x -= 40 * dt;
                    if (this.x <= canvas.width - 210) {
                        this.x = canvas.width - 210;
                        this.state = 'idle';
                        this.stateTimer = 3;
                    }
                    return;
                }

                this.y += Math.sin(this.bobTimer * 2) * 20 * dt;

                this.stateTimer -= dt;
                if (this.stateTimer <= 0) {
                    if (this.state === 'idle') {
                        if (this.hp < this.hpMax / 2 && Math.random() > 0.4) {
                            this.state = 'laser_charge';
                            this.stateTimer = 1.5;
                            playSound('laser_charge');
                        } else {
                            this.state = 'rage';
                            this.stateTimer = 4;
                        }
                    } else if (this.state === 'rage') {
                        this.state = 'idle';
                        this.stateTimer = 3;
                    } else if (this.state === 'laser_charge') {
                        this.state = 'laser_fire';
                        this.stateTimer = 1.8;
                        playSound('laser_fire');
                    } else if (this.state === 'laser_fire') {
                        this.state = 'idle';
                        this.stateTimer = 3;
                    }
                }

                this.shootTimer -= dt;
                if (this.shootTimer <= 0) {
                    this.shootAttack();
                    this.shootTimer = this.state === 'rage' ? 0.3 : 0.75;
                }

                if (this.state === 'laser_charge') {
                    createExplosion(this.x + 15, this.y + 70, '#00ffff', 3);
                }
            }

            shootAttack() {
                if (this.state === 'idle') {
                    enemyBullets.push(new EnemyBullet(this.x + 10, this.y + 50, -260, -80));
                    enemyBullets.push(new EnemyBullet(this.x + 10, this.y + 70, -280, 0));
                    enemyBullets.push(new EnemyBullet(this.x + 10, this.y + 90, -260, 80));
                } else if (this.state === 'rage') {
                    const dy = player.y - (this.y + 70);
                    const dx = player.x - (this.x + 10);
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    enemyBullets.push(new EnemyBullet(this.x + 10, this.y + 70, (dx/dist) * 320, (dy/dist) * 320));

                    if (Math.random() < 0.25 && enemies.length < 5) {
                        enemies.push(new Enemy('boss_minion'));
                    }
                } else if (this.state === 'laser_fire') {
                    enemyBullets.push(new EnemyBullet(this.x + 40, this.y + 20, -180, -150));
                    enemyBullets.push(new EnemyBullet(this.x + 40, this.y + 110, -180, 150));
                }
            }

            takeDamage(amt) {
                this.hp -= amt;
                playSound('hit');
                createExplosion(this.x + Math.random()*120, this.y + Math.random()*100, '#ffffff', 5);

                if (this.hp <= 0) {
                    this.hp = 0;
                    gameWon = true;
                    playSound('explosion');
                    for (let i = 0; i < 35; i++) {
                        setTimeout(() => {
                            createExplosion(this.x + Math.random()*150, this.y + Math.random()*120, '#ff3300', 15);
                            playSound('explosion');
                        }, i * 100);
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // --- Sprite-based boss rendering ---
                // boss_0.png is 1280x896; render scaled to 190x133 (matching original boss footprint)
                const sprite = bossSprites['boss'];
                const hasSprite = sprite && sprite.complete && sprite.naturalWidth > 0;
                const renderW = 190;
                const renderH = 133;

                if (hasSprite) {
                    // State-based visual effects applied on top of the sprite
                    if (this.state === 'laser_charge') {
                        // Cyan charge glow pulsing around the sprite
                        ctx.shadowColor = '#00ffff';
                        ctx.shadowBlur = 15 + Math.sin(this.bobTimer * 8) * 8;
                    }
                    if (this.state === 'rage') {
                        // Red rage tint overlay via global composite
                        ctx.drawImage(sprite, 0, 0, renderW, renderH);
                        ctx.globalCompositeOperation = 'source-atop';
                        ctx.fillStyle = 'rgba(255, 0, 30, 0.25)';
                        ctx.fillRect(0, 0, renderW, renderH);
                        ctx.globalCompositeOperation = 'source-over';
                    } else if (this.state === 'intro') {
                        // Intro: fade in from the right edge
                        const introProgress = Math.min(1, (canvas.width - 210 - this.x) / 100 + 1);
                        ctx.globalAlpha = Math.min(1, introProgress);
                        ctx.drawImage(sprite, 0, 0, renderW, renderH);
                        ctx.globalAlpha = 1;
                    } else {
                        ctx.drawImage(sprite, 0, 0, renderW, renderH);
                    }
                    ctx.shadowBlur = 0;
                } else {
                    // --- Fallback: original canvas-drawn boss (kept for graceful degradation) ---
                    // Tail fin
                    ctx.fillStyle = '#ff3366';
                    ctx.beginPath();
                    ctx.moveTo(140, 70);
                    ctx.lineTo(190, 20);
                    ctx.lineTo(165, 70);
                    ctx.lineTo(190, 120);
                    ctx.closePath();
                    ctx.fill();

                    // Top spines
                    ctx.fillStyle = '#ff3366';
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.moveTo(40 + i*30, 25);
                        ctx.lineTo(65 + i*30, -15);
                        ctx.lineTo(80 + i*30, 25);
                        ctx.closePath();
                        ctx.fill();
                    }

                    // Bottom spines
                    for (let i = 0; i < 2; i++) {
                        ctx.beginPath();
                        ctx.moveTo(60 + i*40, 115);
                        ctx.lineTo(80 + i*40, 145);
                        ctx.lineTo(95 + i*40, 115);
                        ctx.closePath();
                        ctx.fill();
                    }

                    // Main body
                    ctx.fillStyle = this.color;
                    ctx.fillRect(30, 25, 120, 90);

                    // Armor plates
                    for (let col = 0; col < 4; col++) {
                        for (let row = 0; row < 3; row++) {
                            ctx.fillStyle = (col + row) % 2 === 0 ? '#406090' : '#284068';
                            ctx.fillRect(35 + col*28, 30 + row*26, 25, 22);
                        }
                    }

                    // Head / cockpit
                    ctx.fillStyle = '#1e2d42';
                    ctx.beginPath();
                    ctx.moveTo(40, 25);
                    ctx.lineTo(10, 40);
                    ctx.lineTo(0, 70);
                    ctx.lineTo(15, 95);
                    ctx.lineTo(40, 115);
                    ctx.lineTo(45, 25);
                    ctx.closePath();
                    ctx.fill();

                    // Eye
                    ctx.fillStyle = this.state === 'rage' ? '#ff0000' : '#00ffcc';
                    ctx.beginPath();
                    ctx.arc(28, 50, 6, 0, Math.PI*2);
                    ctx.fill();

                    // Vent
                    ctx.fillStyle = '#ff7700';
                    ctx.fillRect(-2, 60, 10, 20);

                    // Rage glow border
                    if (this.state === 'rage') {
                        ctx.strokeStyle = '#ff0055';
                        ctx.lineWidth = 3 + Math.sin(this.bobTimer * 10) * 2;
                        ctx.strokeRect(30, 25, 120, 90);
                    }
                }

                // --- Laser beam overlay (always drawn, independent of sprite/fallback) ---
                if (this.state === 'laser_fire') {
                    ctx.shadowColor = '#00ffff';
                    ctx.shadowBlur = 25;
                    const bGrd = ctx.createLinearGradient(0, 50, 0, 90);
                    bGrd.addColorStop(0, 'rgba(0, 255, 255, 0.2)');
                    bGrd.addColorStop(0.4, '#ffffff');
                    bGrd.addColorStop(0.5, '#00ffff');
                    bGrd.addColorStop(0.6, '#ffffff');
                    bGrd.addColorStop(1, 'rgba(0, 255, 255, 0.2)');
                    ctx.fillStyle = bGrd;

                    // Beam starts at 10px high at mouth (y: 65-75), expanding to 40px (y: 50-90) over first 100px
                    const endX = -this.x;
                    const transX = Math.max(-this.x, -100);
                    ctx.beginPath();
                    ctx.moveTo(0, 65);
                    ctx.lineTo(transX, 50);
                    ctx.lineTo(endX, 50);
                    ctx.lineTo(endX, 90);
                    ctx.lineTo(transX, 90);
                    ctx.lineTo(0, 75);
                    ctx.closePath();
                    ctx.fill();

                    // Concentrated muzzle flash at origin (0, 70)
                    const muzzleGrd = ctx.createRadialGradient(0, 70, 0, 0, 70, 30);
                    muzzleGrd.addColorStop(0, '#ffffff');
                    muzzleGrd.addColorStop(0.3, '#ffffff');
                    muzzleGrd.addColorStop(0.7, 'rgba(0, 255, 255, 0.8)');
                    muzzleGrd.addColorStop(1, 'rgba(0, 255, 255, 0)');
                    ctx.fillStyle = muzzleGrd;
                    ctx.beginPath();
                    ctx.arc(0, 70, 30, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.shadowBlur = 0;
                }

                // --- Rage glow overlay (when using sprite, draw pulsating border) ---
                if (hasSprite && this.state === 'rage') {
                    ctx.strokeStyle = '#ff0055';
                    ctx.lineWidth = 3 + Math.sin(this.bobTimer * 10) * 2;
                    ctx.strokeRect(0, 0, renderW, renderH);
                }

                ctx.restore();
            }
        }

        // --- PowerUp Class ---
        class PowerUp {
            constructor(x, y, kind) {
                this.x = x;
                this.y = y;
                this.kind = kind;
                this.width = 16;
                this.height = 16;
                this.speed = 100;
                this.bob = 0;
            }

            update(dt) {
                this.x -= this.speed * dt;
                this.bob += dt * 6;
                this.y += Math.sin(this.bob) * 1.2;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                const color = this.kind === 'W' ? '#ff0055' : '#00ff55';
                ctx.shadowColor = color;
                ctx.shadowBlur = 8;

                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(8, 8, 8, 0, Math.PI*2);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 10px monospace';
                ctx.fillText(this.kind, 5, 11);

                ctx.restore();
            }
        }

        // --- Particle Class ---
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 250;
                this.vy = (Math.random() - 0.5) * 250;
                this.size = Math.random() * 4 + 1;
                this.alpha = 1.0;
                this.decay = Math.random() * 1.5 + 1.0;
            }

            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.alpha -= this.decay * dt;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.restore();
            }
        }

        // --- Sprite-Based Explosion Class ---
        class SpriteExplosion {
            constructor(x, y, size = 48) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.frame = 0;
                this.frameTimer = 0;
                this.frameDuration = 0.08; // 80ms per frame = ~12.5fps for 4 frames = ~320ms total
                this.alive = true;
            }

            update(dt) {
                this.frameTimer += dt;
                if (this.frameTimer >= this.frameDuration) {
                    this.frameTimer -= this.frameDuration;
                    this.frame++;
                    if (this.frame >= 4) {
                        this.alive = false;
                    }
                }
            }

            draw() {
                if (!this.alive) return;
                const key = 'explosion_' + this.frame;
                const sprite = vfxSprites[key];
                if (sprite && sprite.complete && sprite.naturalWidth > 0) {
                    ctx.save();
                    ctx.globalAlpha = 0.9;
                    ctx.drawImage(sprite,
                        this.x - this.size / 2,
                        this.y - this.size / 2,
                        this.size, this.size);
                    ctx.restore();
                } else {
                    // Fallback: orange flash circle
                    const progress = this.frame / 4;
                    ctx.save();
                    ctx.globalAlpha = 1 - progress;
                    ctx.fillStyle = '#ff6600';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * (0.5 + progress * 0.5), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }
        }

        // --- Parallax Background System ---
        // Image-based parallax layers (bg_nebula, bg_city) + procedural starfield

        const bgImages = {};
        function loadBackgroundImages() {
            const toLoad = [
                { key: 'nebula', src: 'assets/sprites/bg_nebula_0.png' },
                { key: 'city',   src: 'assets/sprites/bg_city_0.png' }
            ];
            let loaded = 0;
            toLoad.forEach(({key, src}) => {
                bgImages[key] = new Image();
                bgImages[key].onload = () => { loaded++; };
                bgImages[key].src = src;
            });
        }
        // Background images lazy-loaded on first user interaction
        let bgImagesLoaded = false;
        function ensureBackgroundImages() {
            if (!bgImagesLoaded) {
                bgImagesLoaded = true;
                loadBackgroundImages();
            }
        }

        class ParallaxLayer {
            constructor(key, speed, yOffset = 0, alpha = 1.0, scale = 1.0) {
                this.key = key;          // Image key in bgImages — lazy-resolved at draw time
                this.speed = speed;
                this.yOffset = yOffset;
                this.alpha = alpha;
                this.scale = scale;
                this.offset = 0;
            }

            getImg() {
                // Lazy-resolve: bgImages is populated asynchronously by ensureBackgroundImages()
                return bgImages[this.key] || null;
            }

            update(dt) {
                const img = this.getImg();
                this.offset = (this.offset + this.speed * dt) % (img ? img.width : canvas.width);
            }

            draw() {
                const img = this.getImg();
                if (!img || !img.complete || img.naturalWidth === 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                const w = img.width * this.scale;
                const h = img.height * this.scale;
                // Tile horizontally for seamless scroll
                const drawX = -this.offset;
                const count = Math.ceil(canvas.width / w) + 1;
                for (let i = 0; i < count; i++) {
                    ctx.drawImage(img, drawX + i * w, this.yOffset, w, h);
                }
                ctx.restore();
            }
        }

        // --- Player Sprite Preloading ---
        const playerSprites = {};
        let playerSpritesLoaded = false;

        function loadPlayerSprites() {
            if (playerSpritesLoaded) return;
            playerSpritesLoaded = true;
            const frames = ['player_0', 'player_1'];
            frames.forEach(key => {
                playerSprites[key] = new Image();
                playerSprites[key].src = `assets/sprites/${key}.png`;
            });
        }

        // --- Enemy Sprite Preloading ---
        const enemySprites = {};
        let enemySpritesLoaded = false;

        function loadEnemySprites() {
            if (enemySpritesLoaded) return;
            enemySpritesLoaded = true;
            const types = ['scout', 'interceptor', 'heavy', 'boss_minion'];
            types.forEach(key => {
                enemySprites[key] = new Image();
                enemySprites[key].src = `assets/sprites/${key}_0.png`;
            });
        }

        // --- VFX Sprite Preloading ---
        const vfxSprites = {};
        let vfxSpritesLoaded = false;

        function loadVFXSprites() {
            if (vfxSpritesLoaded) return;
            vfxSpritesLoaded = true;
            // Laser (player bullets)
            vfxSprites['laser'] = new Image();
            vfxSprites['laser'].src = 'assets/sprites/laser_0.png';
            // Enemy laser + glow
            vfxSprites['laser_enemy'] = new Image();
            vfxSprites['laser_enemy'].src = 'assets/sprites/laser_enemy.png';
            vfxSprites['laser_glow'] = new Image();
            vfxSprites['laser_glow'].src = 'assets/sprites/laser_0_glow.png';
            // Multi-frame explosion (4 frames)
            for (let f = 0; f < 4; f++) {
                vfxSprites['explosion_' + f] = new Image();
                vfxSprites['explosion_' + f].src = `assets/sprites/explosion_${f}.png`;
            }
            // Shield forcefield ring
            vfxSprites['shield'] = new Image();
            vfxSprites['shield'].src = 'assets/sprites/shield_0.png';
        }

        // --- Boss Asset Lazy-Loading ---
        // Boss sprites are preloaded when score nears 2,000-point trigger
        const bossSprites = {};
        let bossAssetsLoading = false;
        let bossAssetsLoaded = false;
        let bossLoadProgress = 0;  // 0-100

        function preloadBossAssets() {
            if (bossAssetsLoading || bossAssetsLoaded) return;
            bossAssetsLoading = true;
            bossLoadProgress = 0;

            const toLoad = [
                { key: 'boss',       src: 'assets/sprites/boss_0.png' },
                { key: 'bossMinion', src: 'assets/sprites/boss_minion_0.png' }
            ];
            let loadedCount = 0;
            const total = toLoad.length;

            toLoad.forEach(({key, src}) => {
                const img = new Image();
                img.onload = () => {
                    loadedCount++;
                    bossLoadProgress = Math.round((loadedCount / total) * 100);
                    if (loadedCount >= total) {
                        bossAssetsLoaded = true;
                        bossAssetsLoading = false;
                    }
                };
                img.onerror = () => {
                    // Graceful fallback: mark done even on error
                    loadedCount++;
                    bossLoadProgress = Math.round((loadedCount / total) * 100);
                    if (loadedCount >= total) {
                        bossAssetsLoaded = true;
                        bossAssetsLoading = false;
                    }
                };
                img.src = src;
                bossSprites[key] = img;
            });
        }

        // --- Offscreen Canvas Pre-Rendering ---
        // Static/procedural assets are rendered to offscreen canvases
        // and blitted in a single drawImage call instead of 100+ individual draws.

        class OffscreenBuffer {
            constructor(width, height) {
                this.canvas = document.createElement('canvas');
                this.canvas.width = width;
                this.canvas.height = height;
                this.ctx = this.canvas.getContext('2d');
                this.dirty = true;          // force first render
                this.renderInterval = 0;     // ms between rebuilds
                this.renderTimer = 0;        // countdown accumulator
            }
            markDirty() { this.dirty = true; }
            rebuild(renderFn) {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                renderFn(this.ctx);
                this.dirty = false;
            }
        }

        // --- Star field (3 depth layers rendered procedurally) ---
        class Star {
            constructor(depth) {
                this.depth = depth; // 1=far, 2=mid, 3=near
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speed = 20 + depth * 25;
                this.size = 0.5 + depth * 0.4;
                this.twinkle = Math.random() * Math.PI * 2;
                this.twinkleSpeed = 1.5 + Math.random() * 2.5;
                this.color = depth === 3 ? '#ccddff' : (depth === 2 ? '#7799cc' : '#334466');
            }

            update(dt) {
                this.x -= this.speed * dt;
                this.twinkle += this.twinkleSpeed * dt;
                if (this.x < -5) {
                    this.x = canvas.width + 5;
                    this.y = Math.random() * canvas.height;
                }
            }

            getAlpha() { return 0.4 + Math.sin(this.twinkle) * 0.35; }
        }

        // Offscreen buffer for star field (rendered lazily every 250ms)
        const starBuffer = new OffscreenBuffer(canvas.width, canvas.height);
        starBuffer.renderInterval = 0.25; // seconds
        const stars = [];
        for (let i = 0; i < 35; i++) stars.push(new Star(1));   // far
        for (let i = 0; i < 22; i++) stars.push(new Star(2));   // mid
        for (let i = 0; i < 10; i++) stars.push(new Star(3));   // near

        function rebuildStarBuffer(offCtx) {
            stars.forEach(star => {
                offCtx.save();
                offCtx.globalAlpha = star.getAlpha();
                offCtx.fillStyle = star.color;
                offCtx.fillRect(star.x, star.y, star.size, star.size);
                offCtx.restore();
            });
        }

        // --- Deep-sea particle layer (ambient drift) ---
        class SeaParticle {
            constructor() {
                this.reset(true);
            }
            reset(initial = false) {
                this.x = initial ? Math.random() * canvas.width : canvas.width + 20;
                this.y = Math.random() * canvas.height;
                this.size = 0.6 + Math.random() * 2.5;
                this.speed = 8 + Math.random() * 25;
                this.drift = (Math.random() - 0.5) * 12;
                this.alpha = 0.05 + Math.random() * 0.18;
                this.color = Math.random() < 0.3 ? '#00ffaa' : '#3388aa';
            }
            update(dt) {
                this.x -= this.speed * dt;
                this.y += this.drift * dt;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
                if (this.x < -10) this.reset();
            }
            draw() {} // No-op — rendered via offscreen buffer
        }

        // Offscreen buffer for sea particles (redrawn every 200ms)
        const seaBuffer = new OffscreenBuffer(canvas.width, canvas.height);
        seaBuffer.renderInterval = 0.20; // seconds

        function rebuildSeaBuffer(offCtx) {
            seaParticles.forEach(p => {
                offCtx.save();
                offCtx.globalAlpha = p.alpha;
                offCtx.fillStyle = p.color;
                offCtx.fillRect(p.x, p.y, p.size, p.size);
                offCtx.restore();
            });
        }

        // --- Game Entity Pools ---
        const player = new Player();
        const bullets = [];
        const enemyBullets = [];
        const enemies = [];
        const powerups = [];
        const particles = [];

        // Parallax background layers (image-based)
        const bgLayers = [
            new ParallaxLayer('nebula', 12, 0, 0.55, canvas.height / 768),      // Far: nebula cloud
            new ParallaxLayer('city',   55, 0, 0.45, canvas.height / 450)        // Mid: city silhouette
        ];

        // Deep-sea ambient particles
        const seaParticles = [];
        for (let i = 0; i < 45; i++) seaParticles.push(new SeaParticle());

        let boss = null;
        let enemySpawnTimer = 1.2;

        const vfxExplosions = [];

        function createExplosion(x, y, color, count = 12) {
            // Sprite-based explosion for the main visual
            const explosionSize = Math.max(40, count * 3.5);
            vfxExplosions.push(new SpriteExplosion(x, y, explosionSize));
            // Keep particles for debris/sparks (reduced count)
            const particleCount = Math.min(count, 6);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function resetGame() {
            score = 0;
            gameOver = false;
            gameWon = false;
            bossSpawned = false;
            boss = null;
            sirenTimer = 0;
            gameTime = 0;
            player.shield = 100;
            player.weaponLevel = 1;
            player.x = 80;
            player.y = canvas.height / 2;
            bullets.length = 0;
            enemyBullets.length = 0;
            enemies.length = 0;
            powerups.length = 0;
            particles.length = 0;
            vfxExplosions.length = 0;
        }

        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;

            if (!paused && !gameOver && !gameWon) {
                gameTime += dt;
                update(dt);
            }

            draw();
            requestAnimationFrame(loop);
        }

        function update(dt) {
            bgLayers.forEach(layer => layer.update(dt));
            stars.forEach(star => star.update(dt));
            seaParticles.forEach(p => p.update(dt));

            // Offscreen buffer lazy-render: rebuild star/sea buffers on interval
            starBuffer.renderTimer += dt;
            if (starBuffer.renderTimer >= starBuffer.renderInterval) {
                starBuffer.rebuild(rebuildStarBuffer);
                starBuffer.renderTimer = 0;
            }
            seaBuffer.renderTimer += dt;
            if (seaBuffer.renderTimer >= seaBuffer.renderInterval) {
                seaBuffer.rebuild(rebuildSeaBuffer);
                seaBuffer.renderTimer = 0;
            }

            player.update(dt);

            if (!bossSpawned) {
                enemySpawnTimer -= dt;
                if (enemySpawnTimer <= 0) {
                    const r = Math.random();
                    if (r < 0.45) {
                        enemies.push(new Enemy('scout'));
                    } else if (r < 0.8) {
                        enemies.push(new Enemy('interceptor'));
                    } else {
                        enemies.push(new Enemy('heavy'));
                    }
                    enemySpawnTimer = Math.max(0.6, 1.5 - (score / 15000));
                }

                if (score >= 1500 && !bossAssetsLoaded) {
                    preloadBossAssets();
                }

                if (score >= 2000) {
                    bossSpawned = true;
                    sirenTimer = 3.0;
                }
            } else {
                if (sirenTimer > 0) {
                    sirenTimer -= dt;
                    if (Math.floor(sirenTimer * 10) % 4 === 0) {
                        playSound('siren');
                    }
                    if (sirenTimer <= 0) {
                        boss = new Boss();
                    }
                } else if (boss) {
                    boss.update(dt);
                }
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.update(dt);
                if (b.x > canvas.width + 20) {
                    bullets.splice(i, 1);
                }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const eb = enemyBullets[i];
                eb.update(dt);
                
                const ebBox = { x: eb.x - eb.size, y: eb.y - eb.size, width: eb.size*2, height: eb.size*2 };
                if (checkCollision(ebBox, player)) {
                    player.takeDamage(12);
                    enemyBullets.splice(i, 1);
                    continue;
                }

                if (eb.x < -20) {
                    enemyBullets.splice(i, 1);
                }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.update(dt);

                if (checkCollision(e, player)) {
                    player.takeDamage(20);
                    createExplosion(e.x + e.width/2, e.y + e.height/2, e.color, 10);
                    enemies.splice(i, 1);
                    continue;
                }

                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    const bBox = { x: b.x - b.size, y: b.y - 2, width: b.size*2, height: 4 };
                    if (checkCollision(bBox, e)) {
                        e.hp -= (player.weaponLevel >= 4 ? 2 : 1);
                        bullets.splice(j, 1);
                        playSound('hit');

                        if (e.hp <= 0) {
                            createExplosion(e.x + e.width/2, e.y + e.height/2, e.color, 12);
                            playSound('explosion');
                            score += e.scoreValue;

                            const dropChance = Math.random();
                            if (dropChance < 0.15) {
                                powerups.push(new PowerUp(e.x, e.y, 'W'));
                            } else if (dropChance < 0.23) {
                                powerups.push(new PowerUp(e.x, e.y, 'S'));
                            }

                            enemies.splice(i, 1);
                            break;
                        }
                    }
                }

                if (e.x < -60) {
                    enemies.splice(i, 1);
                }
            }

            if (boss) {
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    const bBox = { x: b.x - b.size, y: b.y - 2, width: b.size*2, height: 4 };
                    if (checkCollision(bBox, boss)) {
                        const dmg = player.weaponLevel >= 4 ? 2 : 1;
                        boss.takeDamage(dmg);
                        bullets.splice(j, 1);
                    }
                }

                if (checkCollision(player, boss)) {
                    player.takeDamage(35);
                }

                if (boss.state === 'laser_fire') {
                    const laserYStart = boss.y + 50;
                    const laserHeight = 40;
                    if (player.x + player.width > 0 && player.x < boss.x + 20) {
                        if (player.y + player.height > laserYStart && player.y < laserYStart + laserHeight) {
                            player.takeDamage(3);
                        }
                    }
                }
            }

            for (let i = powerups.length - 1; i >= 0; i--) {
                const pu = powerups[i];
                pu.update(dt);

                if (checkCollision(pu, player)) {
                    playSound('powerup');
                    if (pu.kind === 'W') {
                        player.weaponLevel = Math.min(5, player.weaponLevel + 1);
                    } else if (pu.kind === 'S') {
                        player.shield = Math.min(player.shieldMax, player.shield + 30);
                    }
                    powerups.splice(i, 1);
                    continue;
                }

                if (pu.x < -30) {
                    powerups.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update(dt);
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            for (let i = vfxExplosions.length - 1; i >= 0; i--) {
                vfxExplosions[i].update(dt);
                if (!vfxExplosions[i].alive) {
                    vfxExplosions.splice(i, 1);
                }
            }

            uiShield.innerText = Math.round(player.shield) + '%';
            uiShield.style.color = player.shield > 40 ? '#00ff00' : '#ff0033';
            uiWeapon.innerText = 'LVL ' + player.weaponLevel + (player.weaponLevel === 5 ? ' (MAX)' : '');
            uiScore.innerText = score;
        }

        function draw() {
            ctx.fillStyle = '#010108';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Render parallax layers back-to-front (image-based, drawn directly)
            bgLayers.forEach(layer => layer.draw());

            // Blit offscreen buffers (lazy-rendered every 200-250ms)
            // First frame: force-build buffers if not yet rendered
            if (starBuffer.dirty) starBuffer.rebuild(rebuildStarBuffer);
            if (seaBuffer.dirty) seaBuffer.rebuild(rebuildSeaBuffer);
            ctx.drawImage(starBuffer.canvas, 0, 0);
            ctx.drawImage(seaBuffer.canvas, 0, 0);

            bullets.forEach(b => b.draw());
            enemyBullets.forEach(eb => eb.draw());
            powerups.forEach(pu => pu.draw());
            enemies.forEach(e => e.draw());
            if (boss) boss.draw();
            player.draw();
            vfxExplosions.forEach(ex => ex.draw());
            particles.forEach(p => p.draw());

            // Boss asset loading indicator
            if (bossAssetsLoading && !bossAssetsLoaded) {
                const loadY = canvas.height - 30;
                ctx.fillStyle = 'rgba(5, 5, 15, 0.8)';
                ctx.fillRect(canvas.width / 2 - 100, loadY - 12, 200, 28);

                // Progress bar background
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(canvas.width / 2 - 80, loadY + 2, 160, 6);

                // Progress bar fill
                ctx.fillStyle = '#00ffff';
                ctx.fillRect(canvas.width / 2 - 80, loadY + 2, 160 * (bossLoadProgress / 100), 6);

                // Text
                ctx.fillStyle = '#00ffff';
                ctx.font = '10px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('PRELOADING BOSS ASSETS... ' + bossLoadProgress + '%', canvas.width / 2, loadY - 2);
            }

            if (sirenTimer > 0) {
                ctx.fillStyle = 'rgba(255, 0, 0, ' + (Math.sin(gameTime * 20) * 0.2 + 0.25) + ')';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff0033';
                ctx.font = 'bold 32px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('WARNING: BOSS ENGAGING', canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = '16px monospace';
                ctx.fillText('CRITICAL SIGNALS DETECTED AHEAD', canvas.width / 2, canvas.height / 2 + 15);
            }

            if (boss && boss.state !== 'intro') {
                const barWidth = 300;
                const barHeight = 12;
                const bx = canvas.width / 2 - barWidth / 2;
                const by = 20;

                ctx.fillStyle = '#111';
                ctx.fillRect(bx, by, barWidth, barHeight);

                const hpPercent = boss.hp / boss.hpMax;
                ctx.fillStyle = hpPercent > 0.4 ? '#ff3300' : '#ff00ff';
                ctx.fillRect(bx, by, barWidth * hpPercent, barHeight);

                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.strokeRect(bx, by, barWidth, barHeight);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('CYBER COELACANTH', canvas.width / 2, by - 6);
            }

            if (paused) {
                ctx.fillStyle = 'rgba(5, 5, 15, 0.75)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ffff';
                ctx.font = 'bold 36px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('SYSTEM PAUSED', canvas.width / 2, canvas.height / 2);
                ctx.font = '14px monospace';
                ctx.fillText('Press P to Resume System', canvas.width / 2, canvas.height / 2 + 30);
            }

            if (gameOver) {
                ctx.fillStyle = 'rgba(15, 5, 5, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff0033';
                ctx.font = 'bold 42px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('FIGHTER CRUSHED', canvas.width / 2, canvas.height / 2 - 30);
                ctx.fillStyle = '#ffffff';
                ctx.font = '16px monospace';
                ctx.fillText('SCORE: ' + score, canvas.width / 2, canvas.height / 2 + 10);
                ctx.font = '14px monospace';
                ctx.fillStyle = '#8a8a9f';
                ctx.fillText('Click screen or press SPACE to retry', canvas.width / 2, canvas.height / 2 + 45);
                ctx.fillStyle = '#ff0055';
                ctx.font = '11px monospace';
                ctx.fillText('whatanadventure.games/darius-star', canvas.width / 2, canvas.height / 2 + 68);
            }

            if (gameWon) {
                ctx.fillStyle = 'rgba(5, 15, 10, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff55';
                ctx.font = 'bold 42px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('VICTORY ACHIEVED', canvas.width / 2, canvas.height / 2 - 40);
                ctx.fillStyle = '#ffffff';
                ctx.font = '18px monospace';
                ctx.fillText('SCORE: ' + score, canvas.width / 2, canvas.height / 2);
                ctx.fillStyle = '#00ffff';
                ctx.fillText('Cyber Coelacanth eradicated.', canvas.width / 2, canvas.height / 2 + 25);
                ctx.fillStyle = '#8a8a9f';
                ctx.font = '14px monospace';
                ctx.fillText('Click screen or press SPACE to replay', canvas.width / 2, canvas.height / 2 + 60);
                ctx.fillStyle = '#ff0055';
                ctx.font = '11px monospace';
                ctx.fillText('whatanadventure.games/darius-star', canvas.width / 2, canvas.height / 2 + 83);
            }
        }

        function handleInteraction() {
            if (gameOver || gameWon) {
                resetGame();
            }
        }
        canvas.addEventListener('click', handleInteraction);
        window.addEventListener('keydown', e => {
            if (e.key === ' ' && (gameOver || gameWon)) {
                resetGame();
            }
        });

        requestAnimationFrame(loop);
    </script>
</body>
